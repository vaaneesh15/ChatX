<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simply</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Авторизация */
        .auth-container {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-color: #f5f5f7;
        }
        .auth-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(60, 60, 67, 0.08);
        }
        .auth-title {
            font-size: 1.8rem;
            font-weight: 590;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #f9f9fb;
            border: 1px solid rgba(60, 60, 67, 0.08);
            border-radius: 1rem;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #007aff;
        }
        .auth-btn {
            background: #007aff;
            color: white;
            border: none;
            width: 100%;
            padding: 0.9rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 590;
            cursor: pointer;
        }
        .error-text {
            color: #ff3b30;
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.9rem;
        }

        /* Чат */
        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f7;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }
        .message-bubble {
            background: white;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            border: 1.5px solid #e9e9ef;
            word-break: break-word;
        }
        .message-item.own-message .message-bubble {
            border-color: #007aff;
            background: white;
        }
        .message-nick {
            font-size: 0.75rem;
            font-weight: 600;
            color: #5e5e66;
            margin-bottom: 4px;
            margin-left: 0.5rem;
        }
        .message-text {
            font-size: 1rem;
            line-height: 1.4;
            color: black;
        }
        .message-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
            margin-left: 0.5rem;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #8e8e93;
            padding: 4px 8px;
            border-radius: 1rem;
        }

        /* Панель ввода */
        .input-wrapper {
            padding: 0.7rem 1rem;
            margin: 0 1rem 1rem 1rem;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(60, 60, 67, 0.08);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-row input {
            flex: 1;
            background: #f9f9fb;
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            outline: none;
        }
        .input-row input:focus {
            background: white;
        }
        .send-btn {
            background: #007aff;
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="authPage" class="auth-container">
    <div class="auth-card">
        <div class="auth-title">Simply</div>
        <div class="input-group"><input type="text" id="loginNick" placeholder="Ваш ник"></div>
        <button class="auth-btn" id="authBtn">Войти</button>
        <div id="authError" class="error-text"></div>
    </div>
</div>

<div id="appPage" class="app-container" style="display: none;">
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="input-wrapper">
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn">+</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let messages = [];
    let authToken = localStorage.getItem('simply_token');

    // --- Чат ---
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        container.innerHTML = '';
        messages.forEach(msg => {
            const isOwn = currentUser && msg.nick === currentUser.nick;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item';
            if (isOwn) msgDiv.classList.add('own-message');
            msgDiv.innerHTML = `
                <div class="message-nick">${escapeHtml(msg.nick)}</div>
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>
                ${isOwn ? `<div class="message-actions"><button class="delete-btn" data-id="${msg.id}">🗑</button></div>` : ''}
            `;
            container.appendChild(msgDiv);
        });
        // Обработчики удаления
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm('Удалить сообщение?')) {
                    await fetch('/delete-message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nick: currentUser.nick, messageId: id })
                    });
                }
            });
        });
        container.scrollTop = container.scrollHeight;
    }
    async function loadHistory() {
        try {
            const res = await fetch('/messages');
            const data = await res.json();
            messages = data;
            renderMessages();
        } catch(e) { console.error(e); }
    }

    // --- Авторизация ---
    async function performAuth() {
        const nick = document.getElementById('loginNick').value.trim();
        if (!nick) {
            document.getElementById('authError').innerText = 'Введите ник';
            return;
        }
        try {
            const res = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nick })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = { nick: data.nick };
                authToken = data.token;
                localStorage.setItem('simply_token', authToken);
                localStorage.setItem('simply_nick', data.nick);
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('appPage').style.display = 'flex';
                if (socket) socket.disconnect();
                socket = io();
                socket.on('message received', (newMsg) => {
                    messages.push(newMsg);
                    renderMessages();
                });
                socket.on('message deleted', (msgId) => {
                    messages = messages.filter(m => m.id !== msgId);
                    renderMessages();
                });
                await loadHistory();
            } else {
                document.getElementById('authError').innerText = data.error || 'Ошибка';
            }
        } catch(e) {
            document.getElementById('authError').innerText = 'Ошибка соединения';
        }
    }

    async function verifyToken() {
        const token = localStorage.getItem('simply_token');
        const nick = localStorage.getItem('simply_nick');
        if (!token || !nick) return false;
        try {
            const res = await fetch('/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = { nick };
                authToken = token;
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('appPage').style.display = 'flex';
                socket = io();
                socket.on('message received', (newMsg) => {
                    messages.push(newMsg);
                    renderMessages();
                });
                socket.on('message deleted', (msgId) => {
                    messages = messages.filter(m => m.id !== msgId);
                    renderMessages();
                });
                await loadHistory();
                return true;
            }
        } catch(e) {}
        return false;
    }

    // --- Отправка сообщения ---
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !socket || !currentUser) return;
        socket.emit('new message', { nick: currentUser.nick, text });
        input.value = '';
    }

    // --- Инициализация ---
    window.onload = async () => {
        document.getElementById('authBtn').onclick = performAuth;
        document.getElementById('sendBtn').onclick = sendMessage;
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        const logged = await verifyToken();
        if (!logged) {
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('appPage').style.display = 'none';
        }
    };
</script>
</body>
</html>
