<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simply</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Светлая тема */
        :root {
            --bg-page: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #000000;
            --text-secondary: #5e5e66;
            --border-light: rgba(60, 60, 67, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --message-bg: #ffffff;
            --input-bg: #f9f9fb;
            --accent-color: #007aff;
            --accent-light: rgba(0, 122, 255, 0.1);
        }

        /* Тёмная тема */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #000000;
                --card-bg: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #98989e;
                --border-light: rgba(84, 84, 88, 0.3);
                --nav-bg: rgba(28, 28, 30, 0.9);
                --message-bg: #1c1c1e;
                --input-bg: #2c2c2e;
                --accent-color: #0a84ff;
                --accent-light: rgba(10, 132, 255, 0.1);
            }
        }

        /* Цветовые акценты */
        body.accent-blue { --accent-color: #007aff; --accent-light: rgba(0, 122, 255, 0.1); }
        body.accent-purple { --accent-color: #6c5ce7; --accent-light: rgba(108, 92, 231, 0.1); }
        body.accent-pink { --accent-color: #ff6b81; --accent-light: rgba(255, 107, 129, 0.1); }
        body.accent-mint { --accent-color: #2ecc71; --accent-light: rgba(46, 204, 113, 0.1); }
        body.accent-orange { --accent-color: #f39c12; --accent-light: rgba(243, 156, 18, 0.1); }
        body.accent-yellow { --accent-color: #f1c40f; --accent-light: rgba(241, 196, 15, 0.1); }
        body.accent-teal { --accent-color: #1abc9c; --accent-light: rgba(26, 188, 156, 0.1); }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-page);
            overflow: hidden;
        }

        /* Список сообщений (перевёрнутый порядок, чтобы новые сообщения были внизу и прижаты к панели) */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }
        .message-bubble {
            background: var(--message-bg);
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            border: 1px solid var(--border-light);
            word-break: break-word;
            white-space: pre-wrap;
            width: auto;
        }
        .message-item.own-message .message-bubble {
            border-color: var(--accent-color);
        }
        .message-nick {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            margin-left: 0.5rem;
        }
        .message-text {
            font-size: 1rem;
            line-height: 1.4;
            color: var(--text-primary);
        }

        /* Панель ввода */
        .input-wrapper {
            margin: 0 1rem 1.2rem 1rem;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 0.5px solid var(--border-light);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 0.7rem;
        }
        .settings-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .input-row textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            resize: none;
            overflow-y: hidden;
            font-family: inherit;
            line-height: 1.4;
            max-height: 120px;
        }
        .input-row textarea:focus {
            border-color: var(--accent-color);
        }
        .send-btn {
            background: var(--accent-color);
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Модальное окно настроек */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 340px;
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .modal-content h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 590;
        }
        .modal-setting {
            margin-bottom: 1.2rem;
        }
        .modal-setting label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .modal-setting input, .modal-setting select {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
        }
        .modal-close {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 0.7rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 590;
            cursor: pointer;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div id="appContainer" class="app-container">
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="input-wrapper">
        <div class="input-row">
            <button class="settings-btn" id="settingsBtn">⚙️</button>
            <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">+</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div class="modal-setting">
            <label>Ваш ник</label>
            <input type="text" id="nickInput" placeholder="Ник">
        </div>
        <div class="modal-setting">
            <label>Оттенок</label>
            <select id="accentSelect">
                <option value="blue">Синий</option>
                <option value="purple">Фиолетовый</option>
                <option value="pink">Розовый</option>
                <option value="mint">Мятный</option>
                <option value="orange">Оранжевый</option>
                <option value="yellow">Жёлтый</option>
                <option value="teal">Бирюзовый</option>
            </select>
        </div>
        <button class="modal-close" id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    let socket = null;
    let currentUser = { nick: "Пользователь" };
    let messages = [];
    let appSettings = JSON.parse(localStorage.getItem('simply_settings')) || {
        accent: 'blue'
    };

    // Применение акцента
    function applyAccent(accent) {
        document.body.classList.remove('accent-blue', 'accent-purple', 'accent-pink', 'accent-mint', 'accent-orange', 'accent-yellow', 'accent-teal');
        if (accent === 'blue') document.body.classList.add('accent-blue');
        else if (accent === 'purple') document.body.classList.add('accent-purple');
        else if (accent === 'pink') document.body.classList.add('accent-pink');
        else if (accent === 'mint') document.body.classList.add('accent-mint');
        else if (accent === 'orange') document.body.classList.add('accent-orange');
        else if (accent === 'yellow') document.body.classList.add('accent-yellow');
        else if (accent === 'teal') document.body.classList.add('accent-teal');
        appSettings.accent = accent;
        localStorage.setItem('simply_settings', JSON.stringify(appSettings));
    }

    // Рендер сообщений
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        container.innerHTML = '';
        messages.forEach(msg => {
            const isOwn = currentUser && msg.nick === currentUser.nick;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-item';
            if (isOwn) msgDiv.classList.add('own-message');
            msgDiv.innerHTML = `
                <div class="message-nick">${escapeHtml(msg.nick)}</div>
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>
            `;
            container.appendChild(msgDiv);
        });
        // Прокручиваем вниз, чтобы последнее сообщение было видно
        container.scrollTop = container.scrollHeight;
    }

    // Загрузка истории
    async function loadHistory() {
        try {
            const res = await fetch('/messages');
            const data = await res.json();
            messages = data;
            renderMessages();
        } catch(e) { console.error(e); }
    }

    // Отправка сообщения (клавиатура не закрывается)
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !socket || !currentUser) return;
        socket.emit('new message', { nick: currentUser.nick, text });
        input.value = '';
        input.style.height = 'auto';
        // Не вызываем input.blur(), клавиатура остаётся открытой
        input.focus();
    }

    // Авто-расширение textarea
    function autoResizeTextarea() {
        const textarea = document.getElementById('messageInput');
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    // Смена ника
    function changeNick() {
        const newNick = document.getElementById('nickInput').value.trim();
        if (newNick && newNick !== currentUser.nick) {
            currentUser.nick = newNick;
            localStorage.setItem('simply_nick', newNick);
            alert('Ник изменён');
            renderMessages(); // обновляем подписи в сообщениях
        }
    }

    // --- Инициализация ---
    window.onload = async () => {
        // Загружаем сохранённый ник
        const savedNick = localStorage.getItem('simply_nick');
        if (savedNick) currentUser.nick = savedNick;
        document.getElementById('nickInput').value = currentUser.nick;

        applyAccent(appSettings.accent);
        document.getElementById('accentSelect').value = appSettings.accent;

        // Подключаем сокет
        socket = io();
        socket.on('message received', (newMsg) => {
            messages.push(newMsg);
            renderMessages();
        });

        await loadHistory();

        // Обработчики UI
        document.getElementById('sendBtn').onclick = sendMessage;
        const msgInput = document.getElementById('messageInput');
        msgInput.addEventListener('input', autoResizeTextarea);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const start = msgInput.selectionStart;
                const end = msgInput.selectionEnd;
                msgInput.value = msgInput.value.substring(0, start) + '\n' + msgInput.value.substring(end);
                msgInput.selectionStart = msgInput.selectionEnd = start + 1;
                autoResizeTextarea();
            }
        });

        // Модальное окно настроек
        const modal = document.getElementById('settingsModal');
        document.getElementById('settingsBtn').onclick = () => {
            modal.style.display = 'flex';
        };
        document.getElementById('closeModalBtn').onclick = () => {
            changeNick(); // сохраняем ник при закрытии
            const newAccent = document.getElementById('accentSelect').value;
            applyAccent(newAccent);
            modal.style.display = 'none';
        };
        window.onclick = (e) => {
            if (e.target === modal) {
                changeNick();
                const newAccent = document.getElementById('accentSelect').value;
                applyAccent(newAccent);
                modal.style.display = 'none';
            }
        };
    };
</script>
</body>
</html>
